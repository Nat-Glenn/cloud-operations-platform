name: Application CI

on:
  pull_request:
    paths:
      - "services/**"
      - "helm/**"
      - ".github/workflows/application.yml"

  push:
    branches:
      - main
    paths:
      - "services/**"
      - "helm/**"
      - ".github/workflows/application.yml"

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 386566550877.dkr.ecr.ca-central-1.amazonaws.com

jobs:
  validate-services:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - scanning-service
          - licensing-service
          - notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python source
        working-directory: services/${{ matrix.service }}
        run: python -m py_compile app.py

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::386566550877:role/cloud-ops-dev-application-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/cloud-operations-${{ matrix.service }}:${{ github.sha }}

  validate-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/cloud-operations

      - name: Render Helm chart
        run: |
          helm template cloud-operations \
            helm/cloud-operations \
            --namespace staging