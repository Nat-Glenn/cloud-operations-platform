name: Application CI

on:
  pull_request:
    paths:
      - "services/**"
      - "helm/**"
      - ".github/workflows/application.yml"

  push:
    branches:
      - main
    paths:
      - "services/**"
      - "helm/**"
      - ".github/workflows/application.yml"

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ca-central-1
  ECR_REGISTRY: 386566550877.dkr.ecr.ca-central-1.amazonaws.com

jobs:
  detect-service-changes:
    name: Detect changed services
    runs-on: ubuntu-latest

    outputs:
      services: ${{ steps.changes.outputs.services }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed service directories
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"

            # Handles the first push to a new branch.
            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          HEAD_SHA="${{ github.sha }}"

          echo "Comparing $BASE_SHA to $HEAD_SHA"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "$CHANGED_FILES"

          SERVICES=()

          for SERVICE in \
            scanning-service \
            licensing-service \
            notification-service
          do
            if echo "$CHANGED_FILES" | grep -q "^services/${SERVICE}/"; then
              SERVICES+=("$SERVICE")
            fi
          done

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo 'services=[]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            SERVICES_JSON="$(
              printf '%s\n' "${SERVICES[@]}" |
              jq -R . |
              jq -sc .
            )"

            echo "Changed services: $SERVICES_JSON"
            echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

  build_services:
    name: Build ${{ matrix.service }}
    needs: detect-service-changes
    if: needs.detect-service-changes.outputs.has_changes == 'true'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-service-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python source
        working-directory: services/${{ matrix.service }}
        run: python -m py_compile app.py

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::386566550877:role/cloud-ops-dev-application-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and optionally push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/cloud-operations-${{ matrix.service }}:${{ github.sha }}

  update-helm-values:
    name: Update Helm image tags

    needs:
      - detect-service-changes
      - build_services

    if: |
      github.event_name == 'push' &&
      needs.detect-service-changes.outputs.has_changes == 'true' &&
      needs.build_services.result == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML dependency
        run: pip install PyYAML

      - name: Update changed service image tags
        env:
          SERVICES_JSON: ${{ needs.detect-service-changes.outputs.services }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          values_path = Path("helm/cloud-operations/values.yaml")
          values = yaml.safe_load(values_path.read_text())

          changed_services = json.loads(os.environ["SERVICES_JSON"])
          image_tag = os.environ["IMAGE_TAG"]

          value_keys = {
              "scanning-service": "scanning",
              "licensing-service": "licensing",
              "notification-service": "notification",
          }

          for service in changed_services:
              key = value_keys[service]
              old_tag = values[key]["image"]["tag"]
              values[key]["image"]["tag"] = image_tag

              print(f"{service}: {old_tag} -> {image_tag}")

          values_path.write_text(
              yaml.safe_dump(
                  values,
                  sort_keys=False,
                  default_flow_style=False,
              )
          )
          PY

      - name: Show Helm values change
        run: git diff -- helm/cloud-operations/values.yaml

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/cloud-operations/values.yaml

          if git diff --cached --quiet; then
            echo "No Helm image-tag changes to commit."
            exit 0
          fi

          git commit -m "Update Helm image tags to ${GITHUB_SHA}"
          git push origin HEAD:main

  validate-helm:
    name: Validate Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/cloud-operations

      - name: Render Helm chart
        run: |
          helm template cloud-operations \
            helm/cloud-operations \
            --namespace staging