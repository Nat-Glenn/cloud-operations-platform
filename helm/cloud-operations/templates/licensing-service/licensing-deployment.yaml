apiVersion: apps/v1
kind: Deployment

metadata:
  name: licensing-service
  namespace: {{ .Values.global.namespace }}

spec:
  replicas: {{ .Values.licensing.replicaCount }}

  selector:
    matchLabels:
      app: licensing-service

  template:
    metadata:
      labels:
        app: licensing-service

    spec:
      serviceAccountName: {{ .Values.licensing.serviceAccount.name }}

      containers:
        - name: licensing-service

          image: "{{ .Values.licensing.image.repository }}:{{ .Values.licensing.image.tag }}"

          imagePullPolicy: {{ .Values.licensing.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.licensing.service.targetPort }}

          envFrom:
            - configMapRef:
                name: licensing-service-config

          resources:
            requests:
              cpu: {{ .Values.licensing.resources.requests.cpu | quote }}
              memory: {{ .Values.licensing.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.licensing.resources.limits.cpu | quote }}
              memory: {{ .Values.licensing.resources.limits.memory | quote }}

          startupProbe:
            httpGet:
              path: {{ .Values.licensing.probes.startup.path }}
              port: {{ .Values.licensing.service.targetPort }}
            periodSeconds: {{ .Values.licensing.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.licensing.probes.startup.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.licensing.probes.readiness.path }}
              port: {{ .Values.licensing.service.targetPort }}
            periodSeconds: {{ .Values.licensing.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.licensing.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.licensing.probes.readiness.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.licensing.probes.liveness.path }}
              port: {{ .Values.licensing.service.targetPort }}
            periodSeconds: {{ .Values.licensing.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.licensing.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.licensing.probes.liveness.failureThreshold }}