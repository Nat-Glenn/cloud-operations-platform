global:
  namespace: staging

scanning:
  replicaCount: 2

  image:
    repository: 386566550877.dkr.ecr.ca-central-1.amazonaws.com/cloud-operations-scanning-service
    tag: v1.0.1
    pullPolicy: IfNotPresent

  service:
    port: 80
    targetPort: 3000

  serviceAccount:
    name: scanning-service-account

  config:
    APP_NAME: scanning-service
    PORT: "3000"
    ENVIRONMENT: staging

